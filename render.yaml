# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in the Render Dashboard (New > Blueprint) or as a Web Service.
#
# SQLite data lives on a persistent disk at data/ — required so patient records
# survive redeploys. Persistent disks need a paid instance (not Free).

services:
  - type: web
    name: ortho-rounds
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: ortho-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22.5.0"
      - key: ORTHO_PASSWORD
        sync: false
