# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in the Render Dashboard (New > Blueprint) or as a Web Service.
#
# Persistence — pick ONE:
#  A) SQLite + persistent disk (below): patient records survive redeploys via
#     the disk mounted at data/. Persistent disks need a paid instance (not Free).
#  B) MongoDB: set MONGODB_URI and the data lives in a managed database that
#     survives redeploys with no disk required (works on Free). If you use this,
#     you can delete the `disk:` block below.

services:
  - type: web
    name: ortho-rounds
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    # Remove this disk block if you use MONGODB_URI instead.
    disk:
      name: ortho-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22.5.0"
      # First-boot admin only (ignored once any user already exists in the DB).
      - key: ORTHO_ADMIN_USERNAME
        value: "admin"
      - key: ORTHO_ADMIN_PASSWORD
        sync: false
      # Optional: set to a MongoDB connection string to use MongoDB instead of
      # the SQLite disk (then the disk block above can be removed). Preferred on
      # Free plans without a persistent disk — accounts live in Mongo too.
      - key: MONGODB_URI
        sync: false
      # Optional: enable AI assistants (draft plan, polish presentation, handover).
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
